{% extends 'base.html' %}
{% block title %}Filter Employee{% endblock %}

{% block content %}
<div class="card card-custom p-4">
  <h1 class="page-title">Filter Employees</h1>
  <p class="text-muted">Search by name, department, role, or location.</p>

  <form class="row gy-3 gx-2 align-items-end">
    <div class="col-md-3">
      <label class="form-label">First Name</label>
      <input class="form-control" type="text" />
    </div>
    <div class="col-md-3">
      <label class="form-label">Last Name</label>
      <input class="form-control" type="text" />
    </div>
    <div class="col-md-3">
      <label class="form-label">Department</label>
      <input class="form-control" type="text" />
    </div>
    <div class="col-md-3">
      <button class="btn btn-primary-custom w-100">Apply Filter</button>
    </div>
  </form>
</div>
{% endblock %}
