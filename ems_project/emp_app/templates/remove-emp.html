{% extends 'base.html' %}
{% block title %}Remove Employee{% endblock %}

{% block content %}
<div class="card card-custom p-4">
  <h1 class="page-title">Remove Employee</h1>
  <p class="text-muted">Enter the employee ID to remove from the list.</p>

  <form class="row g-3">
    <div class="col-md-4">
      <label class="form-label">Employee ID</label>
      <input class="form-control" type="number" min="1" placeholder="1" />
    </div>
    <div class="col-12">
      <button class="btn btn-danger btn-lg">Remove</button>
    </div>
  </form>
</div>
{% endblock %}
