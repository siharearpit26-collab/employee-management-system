{% load static %}
<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Office Employee Management System{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" integrity="sha384-9ndCyUa0R7aIbQhXuBYL+8QmjEhbjaeeGpZWkN4eVqk0ll4gtG7x8ec+1oHtwF5X" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.4/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="{% static 'emp_app/css/style.css' %}" />
  </head>
  <body>
    <header class="app-header navbar navbar-expand-lg bg-primary text-white px-4 py-3">
      <div class="container-fluid">
        <a class="navbar-brand text-white font-weight-bold" href="/">Employee Management</a>
        <div class="navbar-nav">
          <a class="nav-link text-white" href="/all_employee/">All Employees</a>
          <a class="nav-link text-white" href="/add_employee/">Add Employee</a>
          <a class="nav-link text-white" href="/remove_employee/1/">Remove Employee</a>
          <a class="nav-link text-white" href="/filter_employee/1/">Filter Employee</a>
        </div>
      </div>
    </header>

    <main class="container py-4">
      {% block content %}{% endblock %}
    </main>

    <footer class="app-footer text-center py-3 mt-4">
      <small>© {{ now|date:"Y" }} Office Employee Management System</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
