services:
  - type: web
    name: ems-project
    runtime: python
    buildCommand: "pip install -r requirements.txt && cd ems_project && DJANGO_SETTINGS_MODULE=ems_project.settings python manage.py collectstatic --noinput"
    startCommand: "cd ems_project && DJANGO_SETTINGS_MODULE=ems_project.settings python manage.py migrate --noinput && DJANGO_SETTINGS_MODULE=ems_project.settings gunicorn ems_project.wsgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: ems_project.settings
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "employee-management-system-ukpf.onrender.com,.onrender.com"
      - key: DEBUG
        value: "False"
